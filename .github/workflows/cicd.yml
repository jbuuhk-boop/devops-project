name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- BACKEND ----------------
      - name: Build Backend Image
        run: |
          docker build -t hisham55990/backend:latest ./server

      - name: Push Backend Image
        run: |
          docker push hisham55990/backend:latest

      # ---------------- FRONTEND ----------------
      - name: Build Frontend Image
        run: |
          docker build -t hisham55990/frontend:latest ./client

      - name: Push Frontend Image
        run: |
          docker push hisham55990/frontend:latest
